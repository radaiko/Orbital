<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Chunky design optimized for 16-32px rendering.
       Not used for the app icon (icon.svg is the canonical product icon);
       this is only for the system tray / menu bar where tiny render size
       demands bolder strokes. -->
  <g transform="translate(16 16) rotate(-30)">
    <ellipse cx="0" cy="0" rx="12" ry="5"
             fill="none" stroke="#3b82f6" stroke-width="2.5"
             stroke-linecap="round"/>
    <circle cx="12" cy="0" r="3.5" fill="#60a5fa"/>
  </g>
</svg>
